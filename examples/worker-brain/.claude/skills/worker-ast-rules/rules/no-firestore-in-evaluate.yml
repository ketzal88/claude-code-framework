id: no-firestore-in-evaluate
language: TypeScript
severity: error
message: |
  AlertEngine.evaluate() must be pure computation — zero DB access.
  Detected Firestore call inside an evaluate() method. Move the fetch to the
  caller (AlertEngine.run() or ClientSnapshotService.computeAndStore()) and
  pass pre-fetched data via the input object.
  See .claude/rules/alert-engine-pattern.md
rule:
  any:
    - pattern: db.collection($$$)
    - pattern: firestore.collection($$$)
    - pattern: getFirestore($$$)
    - pattern: $X.collection($$$).doc($$$).get()
    - pattern: $X.collection($$$).get()
  inside:
    stopBy: end
    any:
      - kind: method_definition
        has:
          field: name
          regex: "^evaluate$"
      - kind: function_declaration
        has:
          field: name
          regex: "^evaluate$"
files:
  - "src/lib/alert-engines/**"
  - "src/lib/alert-engine.ts"