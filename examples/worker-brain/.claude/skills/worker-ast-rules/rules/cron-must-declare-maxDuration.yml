id: cron-must-declare-maxDuration
language: TypeScript
severity: warning
message: |
  Cron route does not declare `export const maxDuration`. Vercel defaults to
  10-60s which will silently truncate long syncs. Add `export const maxDuration = 300;`
  (or split the job via channel_backfill_queue if you need more).
  See .claude/rules/cron-security.md
rule:
  any:
    - pattern: export async function GET($$$) { $$$ }
    - pattern: export async function POST($$$) { $$$ }
    - pattern: export const GET = $_
    - pattern: export const POST = $_
  not:
    follows:
      stopBy: end
      pattern: export const maxDuration = $_
    precedes:
      stopBy: end
      pattern: export const maxDuration = $_
files:
  - "src/app/api/cron/**/route.ts"