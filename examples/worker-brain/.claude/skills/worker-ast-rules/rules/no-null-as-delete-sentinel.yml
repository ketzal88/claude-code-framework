id: no-null-as-delete-sentinel
language: TypeScript
severity: warning
message: |
  Firestore stores nulls — they do NOT delete the field. If your intent is to
  remove a field, use FieldValue.delete():
      import { FieldValue } from 'firebase-admin/firestore';
      await ref.update({ field: FieldValue.delete() });
  If your intent is to actually store null, ignore this warning (or refactor
  to use undefined — the repo has ignoreUndefinedProperties: true).
  See .claude/rules/firestore-conventions.md
rule:
  any:
    - pattern: "$X.update({ $$$A, $K: null, $$$B })"
    - pattern: "$X.update({ $K: null })"
    - pattern: "$X.set({ $$$A, $K: null, $$$B }, { merge: true })"
files:
  - "src/**/*.ts"
  - "src/**/*.tsx"
ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"